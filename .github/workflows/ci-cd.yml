name: CI-CD my-note-fe

on:
  push:
    branches:
      - main

jobs:
  ci-cd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_KEY }}
          known_hosts: "secret"

      - name: Adding Known Hosts
        run: ssh-keyscan -H 103.179.57.159 >> ~/.ssh/known_hosts

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-note-fe:latest
          build-args: |
            VITE_API_URL=/api

      - name: Deploy
        run: |
          ssh ${{ secrets.SSH_USER }}@103.179.57.159 "cd ~/my-note && docker compose pull note-fe"
          ssh ${{ secrets.SSH_USER }}@103.179.57.159 "cd ~/my-note && docker compose up -d note-fe"
          ssh ${{ secrets.SSH_USER }}@103.179.57.159 "docker system prune -af || true"